name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  worker:
    name: worker (app/) — test + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run typecheck

  action:
    name: action (action/) — build + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: action
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: action/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: verify dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::dist/ is out of date — run 'npm run build' in action/ and commit"
            git diff dist/
            exit 1
          fi
